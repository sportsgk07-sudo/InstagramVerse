name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: instagramverse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/instagramverse_test?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-test-secret-key-minimum-32-chars
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate
      - run: npx prisma db push

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/instagramverse_test?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-test-secret-key-minimum-32-chars
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: instagramverse_test
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
